    <script>
      // Standalone mode: activate the interface/background once the engine exists.
      // (Do NOT force the overlay state -- the engine's own closed->open click flow
      // is the only path that actually opens the 3D book.)
      if (window.parent === window) {
        const tryReady = setInterval(() => {
          if (!window.fwdufb0) return;
          clearInterval(tryReady);
          window.postMessage({ source: "mhw-book-parent", type: "MHW_BOOK_OPEN" }, "*");
          [500, 1500, 3000].forEach((t) => setTimeout(() => {
            window.dispatchEvent(new Event("resize"));
            window.postMessage({ source: "mhw-book-parent", type: "MHW_BOOK_RESIZE" }, "*");
          }, t));
        }, 200);
      }
    </script>
